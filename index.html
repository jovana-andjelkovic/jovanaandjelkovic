    <script>
    // ── Runner game ───────────────────────────────────────
    (function () {
      var GROUND_OFFSET = 0;
      var CHAR_W = 48, CHAR_H = 48;
      var GRAVITY = 0.6;
      var JUMP_VY = -13;
      var OBSTACLE_W = 48;
      var OBSTACLE_TYPES = [
        { srcX:  0, srcY:  0, srcW: 32, srcH: 32, w: OBSTACLE_W, h: OBSTACLE_W },
        { srcX:  0, srcY: 32, srcW: 32, srcH: 32, w: OBSTACLE_W, h: OBSTACLE_W },
        { srcX:  0, srcY: 64, srcW: 32, srcH: 32, w: OBSTACLE_W, h: OBSTACLE_W },
        { srcX: 32, srcY:  0, srcW: 32, srcH: 64, w: OBSTACLE_W, h: OBSTACLE_W * 2 },
      ];
      var INITIAL_SPEED = 5;
      var MAX_SPEED = 11;
      var SPEED_INCREMENT = 0.003;  // rate of approach toward MAX_SPEED
      var SPEED_DELAY = 8000;       // ms at initial speed before ramping
      var SPAWN_BASE_MS = 2200;     // base spawn interval at initial speed, scales with speed

      var IDLE = 0, PLAYING = 1, GAME_OVER = 2;
      var state = IDLE;

      var canvas = document.createElement('canvas');
      canvas.id = 'game-canvas';
      document.body.appendChild(canvas);
      var ctx = canvas.getContext('2d');

      var gameChar = document.getElementById('game-char');
      var gameBubble = document.getElementById('game-bubble');

      // Game state
      var charY = 0;        // distance above ground
      var charVY = 0;
      var obstacles = [];
      var score = 0;
      var rawScore = 0;
      var speed = INITIAL_SPEED;
      var rafId = null;
      var spawnTimer = null;
      var lastTime = 0;
      var elapsed = 0;
      var canRestart = false;
      var animFrame = 1;
      var animTimer = 0;
      var ANIM_INTERVAL = 120; // ms per walk frame

      var canvas2d = canvas; // alias for clarity in glitch closure

      (function glitchLoop() {
        function rnd(min, max) { return min + Math.random() * (max - min); }
        function makeFilter(spread, a) {
          return 'blur(0.6px) brightness(' + rnd(1.1, 1.3).toFixed(2) + ') ' +
                 'drop-shadow(' + (-spread).toFixed(1) + 'px 1px rgba(255,30,80,' + a + ')) ' +
                 'drop-shadow(' + spread.toFixed(1) + 'px -1px rgba(0,210,255,' + a + '))';
        }
        function tick() {
          if (state === PLAYING || state === GAME_OVER) {
            canvas2d.style.filter = makeFilter(rnd(1, 2.5), 0.55);
          }
          setTimeout(tick, rnd(80, 250));
        }
        function burst() {
          if (state === PLAYING || state === GAME_OVER) {
            canvas2d.style.filter = makeFilter(rnd(3, 6), 0.8);
          }
          setTimeout(function () {
            tick();
            setTimeout(burst, rnd(3000, 7000));
          }, rnd(150, 400));
        }
        tick();
        setTimeout(burst, rnd(3000, 7000));
      })();
      var idleTimer = null;

      function resetIdleTimer() {
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(function () {
          if (state !== IDLE) hideGame();
        }, 5000);
      }

      function clearIdleTimer() {
        if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
      }

      var sprite = new Image();
      sprite.src = 'kitty-Sheet.png';

      var obstacleSprite = new Image();
      obstacleSprite.src = '32-obstacles.png';

      var cssW = window.innerWidth, cssH = window.innerHeight;

      function resize() {
        var dpr = window.devicePixelRatio || 1;
        cssW = window.innerWidth;
        cssH = window.innerHeight;
        canvas.width  = cssW * dpr;
        canvas.height = cssH * dpr;
        canvas.style.width  = cssW + 'px';
        canvas.style.height = cssH + 'px';
        ctx.scale(dpr, dpr);
      }
      resize();
      window.addEventListener('resize', resize);

      function groundY() { return cssH - GROUND_OFFSET; }
      function charX()   { return cssW / 2; }

      function startGame() {
        if (rafId) cancelAnimationFrame(rafId);
        if (spawnTimer) clearTimeout(spawnTimer);
        clearIdleTimer();
        resetGame();
        state = PLAYING;
        gameChar.style.display = 'none';
        gameBubble.style.display = 'none';
        lastTime = 0;
        scheduleSpawn();
        rafId = requestAnimationFrame(gameLoop);
      }

      function resetGame() {
        charY = 0;
        charVY = 0;
        obstacles = [];
        score = 0;
        rawScore = 0;
        speed = INITIAL_SPEED;
        elapsed = 0;
        animFrame = 1;
        animTimer = 0;
      }

      function hideGame() {
        state = IDLE;
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        if (spawnTimer) { clearTimeout(spawnTimer); spawnTimer = null; }
        clearIdleTimer();
        ctx.clearRect(0, 0, cssW, cssH);
        canvas.style.filter = 'none';
        gameChar.style.display = '';
        gameBubble.style.display = '';
      }

      function jump() {
        if (charY <= 0) {
          charVY = JUMP_VY;
        }
      }

      function scheduleSpawn() {
        // Keep visual gap consistent: interval shrinks as speed grows
        var base = SPAWN_BASE_MS * (INITIAL_SPEED / speed);
        var delay = Math.max(600, base * (0.7 + Math.random() * 0.6));
        spawnTimer = setTimeout(function () {
          if (state !== PLAYING) return;
          var t = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
          obstacles.push({ x: cssW, w: t.w, h: t.h, type: t });
          scheduleSpawn();
        }, delay);
      }

      function checkCollision() {
        var cx = charX(), cy = groundY() - charY - CHAR_H;
        var cx2 = cx + CHAR_W, cy2 = cy + CHAR_H;
        for (var i = 0; i < obstacles.length; i++) {
          var o = obstacles[i];
          var ox = o.x, oy = groundY() - o.h;
          var ox2 = ox + o.w, oy2 = oy + o.h;
          // AABB with 4px shrink for leniency
          if (cx2 - 4 > ox + 4 && cx + 4 < ox2 - 4 && cy2 - 4 > oy + 4 && cy + 4 < oy2 - 4) {
            return true;
          }
        }
        return false;
      }

      function endGame() {
        state = GAME_OVER;
        canRestart = false;
        setTimeout(function () { if (state === GAME_OVER) canRestart = true; }, 800);
        resetIdleTimer(); // auto-idle after 5s of inactivity on game over screen
        if (spawnTimer) clearTimeout(spawnTimer);
        cancelAnimationFrame(rafId);
        rafId = null;
        drawGameOver();
      }

      function drawGameOver() {
        var vw = cssW, vh = cssH;
        var pill = { w: 140, h: 36 };
        var px = charX() - pill.w / 2, py = cssH - pill.h - 8;
        ctx.fillStyle = 'rgba(33,17,73,0.88)';
        if (ctx.roundRect) {
          ctx.beginPath();
          ctx.roundRect(px, py, pill.w, pill.h, 6);
          ctx.fill();
        } else {
          ctx.fillRect(px, py, pill.w, pill.h);
        }

        ctx.textAlign = 'center';
        ctx.fillStyle = '#EAE7F2';
        ctx.font = 'bold 11px "JetBrains Mono", monospace';
        ctx.fillText('GAME OVER  ' + score + ' m', charX(), py + 15);

        ctx.fillStyle = 'rgba(234,231,242,0.55)';
        ctx.font = '9px "JetBrains Mono", monospace';
        ctx.fillText('SPACE · TAP TO RESTART', charX(), py + 28);
      }

      function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        var dt = Math.min((timestamp - lastTime) / 16.67, 3); // normalise to ~60fps frames
        lastTime = timestamp;

        elapsed += dt * 16.67;
        if (elapsed > SPEED_DELAY) {
          // Asymptotic ramp — accelerates quickly at first, flattens near MAX_SPEED
          speed += SPEED_INCREMENT * ((MAX_SPEED - speed) / MAX_SPEED) * dt * 16.67;
        }

        animTimer += dt * 16.67;
        if (animTimer >= ANIM_INTERVAL) {
          animTimer -= ANIM_INTERVAL;
          animFrame = animFrame === 1 ? 2 : 1;
        }

        // Physics
        charVY += GRAVITY * dt;
        charY -= charVY * dt;
        if (charY <= 0) { charY = 0; charVY = 0; }

        // Move obstacles
        for (var i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].x -= speed * dt;
          if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
        }

        rawScore += speed * dt * 0.1;
        score = Math.floor(rawScore);

        if (checkCollision()) { draw(); endGame(); return; }

        draw();
        rafId = requestAnimationFrame(gameLoop);
      }

      function draw() {
        var vw = cssW, vh = cssH;
        ctx.clearRect(0, 0, vw, vh);

        // Ground line
        ctx.beginPath();
        ctx.moveTo(0, groundY());
        ctx.lineTo(vw, groundY());
        ctx.strokeStyle = 'rgba(109,121,202,0.35)';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        // Character
        var cx = Math.floor(charX()), cy = Math.floor(groundY() - charY - CHAR_H);
        var frameIdx = charY > 0 ? 0 : animFrame;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(sprite, frameIdx * 32, 0, 32, 32, cx, cy, CHAR_W, CHAR_H);

        // Obstacles
        ctx.imageSmoothingEnabled = false;
        for (var i = 0; i < obstacles.length; i++) {
          var o = obstacles[i];
          ctx.drawImage(obstacleSprite, o.type.srcX, o.type.srcY, o.type.srcW, o.type.srcH, Math.floor(o.x), Math.floor(groundY() - o.h), o.w, o.h);
        }

        // Score
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(33,17,73,0.65)';
        ctx.font = '13px "JetBrains Mono", monospace';
        ctx.fillText(score + ' m', vw - 16, 20);
      }

      // ── Input handling ────────────────────────────────────
      document.addEventListener('keydown', function (e) {
        if (e.code === 'Escape') {
          if (state !== IDLE) hideGame();
          return;
        }
        if (e.code !== 'Space') return;
        e.preventDefault();
        if (state === IDLE)                        startGame();
        else if (state === PLAYING)                jump();
        else if (state === GAME_OVER && canRestart) startGame();
      });

      gameChar.addEventListener('click', function () {
        if (state === IDLE) startGame();
      });
      gameChar.addEventListener('keydown', function (e) {
        if (e.code === 'Enter' || e.code === 'Space') {
          e.preventDefault();
          if (state === IDLE) startGame();
        }
      });

      document.addEventListener('click', function (e) {
        if (e.target.closest('a, button, [role="button"], input, label')) return;
        if (state === PLAYING)                      jump();
        else if (state === GAME_OVER && canRestart) startGame();
      });

      document.addEventListener('touchstart', function (e) {
        if (e.target.closest('a, button, [role="button"], input, label')) return;
        e.preventDefault();
        if (state === PLAYING)                      jump();
        else if (state === GAME_OVER && canRestart) startGame();
      }, { passive: false });

      gameChar.addEventListener('touchstart', function (e) {
        e.preventDefault();
        if (state === IDLE) startGame();
      }, { passive: false });

    })();
    </script>

    <script>
      (function () {
        var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // ── Grid config ───────────────────────────────────────
        var cfg = {
          tiltX:       0,
          tiltY:       0,
          rotZ:        90,
          perspective: 800,
          spacing:     20,
          majorFreq:   4,
          opacity:     0.4,
          vignette:    1,
        };

        // ── Grid canvas ───────────────────────────────────────
        // Direct fixed child of body — no overflow:hidden ancestor,
        // so CSS 3D transforms work correctly.
        var gridCanvas = document.createElement('canvas');
        gridCanvas.style.cssText = 'position:fixed;pointer-events:none;z-index:0';
        document.body.appendChild(gridCanvas);
        var gctx = gridCanvas.getContext('2d');
        var gW = 0, gH = 0;

        function resizeGrid() {
          var vw = window.innerWidth, vh = window.innerHeight;
          gW = gridCanvas.width  = Math.ceil(vw * 1.8);
          gH = gridCanvas.height = Math.ceil(vh * 1.8);
          gridCanvas.style.width  = gW + 'px';
          gridCanvas.style.height = gH + 'px';
          gridCanvas.style.left   = Math.round((vw - gW) / 2) + 'px';
          gridCanvas.style.top    = Math.round((vh - gH) / 2) + 'px';
          // transform-origin at canvas center = viewport center
          gridCanvas.style.transformOrigin = (gW / 2) + 'px ' + (gH / 2) + 'px';
        }
        resizeGrid();
        window.addEventListener('resize', function () { resizeGrid(); applyTransform(); drawGrid(); });

        function applyTransform() {
          gridCanvas.style.transform =
            'perspective(' + cfg.perspective + 'px) ' +
            'rotateX(' + cfg.tiltX + 'deg) ' +
            'rotateY(' + cfg.tiltY + 'deg) ' +
            'rotateZ(' + cfg.rotZ  + 'deg)';
        }
        applyTransform();

        function drawGrid() {
          gctx.clearRect(0, 0, gW, gH);
          var sp = cfg.spacing;
          var op = cfg.opacity;
          var cx = gW / 2, cy = gH / 2;

          // Vertical lines — centered on canvas
          var firstX = ((cx % sp) + sp) % sp;
          for (var x = firstX - sp; x < gW + sp; x += sp) {
            var ci = ((Math.round((x - cx) / sp) % cfg.majorFreq) + cfg.majorFreq) % cfg.majorFreq;
            var mv = ci === 0;
            gctx.beginPath();
            gctx.moveTo(x, 0);
            gctx.lineTo(x, gH);
            gctx.strokeStyle = 'rgba(109,121,202,' + ((mv ? 0.35 : 0.13) * op).toFixed(3) + ')';
            gctx.lineWidth   = mv ? 1.2 : 0.6;
            gctx.stroke();
          }

          // Horizontal lines — centered on canvas
          var firstY = ((cy % sp) + sp) % sp;
          for (var y = firstY - sp; y < gH + sp; y += sp) {
            var ri = ((Math.round((y - cy) / sp) % cfg.majorFreq) + cfg.majorFreq) % cfg.majorFreq;
            var mh = ri === 0;
            gctx.beginPath();
            gctx.moveTo(0, y);
            gctx.lineTo(gW, y);
            gctx.strokeStyle = 'rgba(109,121,202,' + ((mh ? 0.35 : 0.13) * op).toFixed(3) + ')';
            gctx.lineWidth   = mh ? 1.2 : 0.6;
            gctx.stroke();
          }

          // Radial vignette
          if (cfg.vignette > 0) {
            var r  = Math.sqrt(cx * cx + cy * cy);
            var vg = gctx.createRadialGradient(cx, cy, r * 0.25, cx, cy, r);
            vg.addColorStop(0, 'rgba(0,0,0,0)');
            vg.addColorStop(1, 'rgba(0,0,0,' + cfg.vignette + ')');
            gctx.save();
            gctx.globalCompositeOperation = 'destination-out';
            gctx.fillStyle = vg;
            gctx.fillRect(0, 0, gW, gH);
            gctx.restore();
          }
        }
        drawGrid();

        // ── Film grain ────────────────────────────────────────
        var scene = document.createElement('div');
        scene.style.cssText = 'position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none';
        document.body.appendChild(scene);

        var grain = document.createElement('div');
        grain.style.cssText = 'position:absolute;inset:0;pointer-events:none;background-repeat:repeat;opacity:1';
        scene.appendChild(grain);

        var gc = document.createElement('canvas');
        gc.width = gc.height = 256;
        var gx = gc.getContext('2d');

        function redrawGrain() {
          var id = gx.createImageData(256, 256);
          var d  = id.data;
          for (var i = 0; i < d.length; i += 4) {
            var v = Math.random() * 255 | 0;
            d[i] = d[i+1] = d[i+2] = v;
            d[i+3] = Math.random() * 18 | 0;
          }
          gx.putImageData(id, 0, 0);
          grain.style.backgroundImage = 'url(' + gc.toDataURL() + ')';
        }
        redrawGrain();
        if (!prefersReducedMotion) {
          setInterval(redrawGrain, 400);
        }

        // Body content above scene layer
        document.querySelector('.container').style.position = 'relative';
        document.querySelector('.container').style.zIndex   = '1';

      })();
    </script>
    <script>
      // ── & analog CRT ─────────────────────────────────────────
      (function () {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        var el = document.querySelector('.italic');
        if (!el) return;
        var hovered = false;

        function rnd(min, max) { return min + Math.random() * (max - min); }
        function dir() { return Math.random() < 0.5 ? -1 : 1; }

        function rgbSplit(spread, a) {
          return (-spread).toFixed(1) + 'px 1px rgba(255,30,80,' + a + '),' +
                  spread.toFixed(1) + 'px -1px rgba(0,210,255,' + a + ')';
        }

        // Static CRT glitch — the default resting state
        function holdGlitch() {
          var d = dir(), spread = rnd(3, 6);
          el.style.transition = 'none';
          el.style.filter     = 'blur(1.5px) brightness(' + rnd(1.2, 1.45).toFixed(2) + ')';
          el.style.transform  = 'translateX(' + (d * rnd(5, 10)).toFixed(1) + 'px)';
          el.style.textShadow = rgbSplit(spread, 0.65);
        }

        // SVG noise filter for occasional displacement bursts
        var ns = 'http://www.w3.org/2000/svg';
        var svgEl = document.createElementNS(ns, 'svg');
        svgEl.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden';
        var defs = document.createElementNS(ns, 'defs');
        var filt = document.createElementNS(ns, 'filter');
        filt.setAttribute('id', 'crt-noise');
        filt.setAttribute('x', '-10%'); filt.setAttribute('y', '-10%');
        filt.setAttribute('width', '120%'); filt.setAttribute('height', '120%');
        var turb = document.createElementNS(ns, 'feTurbulence');
        turb.setAttribute('type', 'turbulence');
        turb.setAttribute('baseFrequency', '0.65 0.35');
        turb.setAttribute('numOctaves', '4');
        turb.setAttribute('seed', '1');
        var disp = document.createElementNS(ns, 'feDisplacementMap');
        disp.setAttribute('in', 'SourceGraphic');
        disp.setAttribute('in2', 'noise');
        disp.setAttribute('scale', '5');
        disp.setAttribute('xChannelSelector', 'R');
        disp.setAttribute('yChannelSelector', 'G');
        filt.appendChild(turb); filt.appendChild(disp);
        defs.appendChild(filt); svgEl.appendChild(defs);
        document.body.appendChild(svgEl);

        // Noise seed runs continuously so it's ready when applied
        var seed = 1;
        (function tick() {
          turb.setAttribute('seed', (seed = seed % 999 + 1));
          setTimeout(tick, 200);
        })();

        function scheduleNoise() {
          setTimeout(function () {
            if (hovered) { scheduleNoise(); return; }
            el.style.filter = 'url(#crt-noise) blur(1.5px) brightness(' + rnd(1.2, 1.45).toFixed(2) + ')';
            setTimeout(function () {
              if (!hovered) holdGlitch();
              scheduleNoise();
            }, rnd(300, 900));
          }, rnd(5000, 12000));
        }

        // Apply CRT state immediately — no plain text ever visible
        holdGlitch();
        el.style.opacity = '0';
        el.style.filter  = 'blur(14px) brightness(1.3)'; // override holdGlitch filter for blur-in start

        // Blur in with CRT look intact
        setTimeout(function () {
          el.style.transition = 'opacity 1s ease-out, filter 1s ease-out';
          el.style.opacity    = '1';
          el.style.filter     = 'blur(1.5px) brightness(1.3)';
          setTimeout(function () {
            el.style.transition = 'none';
            holdGlitch();
            scheduleNoise();
          }, 1050);
        }, 30);

        el.addEventListener('mouseenter', function () {
          hovered = true;
          el.style.transition  = 'none';
          el.style.filter      = 'none';
          el.style.transform   = '';
          el.style.textShadow  = '';
        });

        el.addEventListener('mouseleave', function () {
          hovered = false;
          holdGlitch();
        });
      })();

      // ── CRT hover for links ───────────────────────────────────
      (function () {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        function rnd(min, max) { return min + Math.random() * (max - min); }
        function dir() { return Math.random() < 0.5 ? -1 : 1; }
        function rgbSplit(spread, a) {
          return (-spread).toFixed(1) + 'px 1px rgba(255,30,80,' + a + '),' +
                  spread.toFixed(1) + 'px -1px rgba(0,210,255,' + a + ')';
        }

        document.querySelectorAll('.info-column-list a, .job-title a').forEach(function (link) {
          var ver = 0;

          link.addEventListener('mouseenter', function () {
            var v = ++ver;
            var d = dir(), spread = rnd(1, 2);
            var tx1 = d * rnd(1.5, 3), tx2 = -d * rnd(0.5, 1.5);

            // Frame 1 — glitch in
            link.style.transition  = 'none';
            link.style.filter      = 'blur(0.5px) brightness(' + rnd(1.2, 1.4).toFixed(2) + ')';
            link.style.transform   = 'translateX(' + tx1.toFixed(1) + 'px)';
            link.style.textShadow  = rgbSplit(spread, 0.55);

            setTimeout(function () {
              if (ver !== v) return;
              // Frame 2 — counter-glitch
              link.style.filter     = 'blur(0.3px) brightness(1.1)';
              link.style.transform  = 'translateX(' + tx2.toFixed(1) + 'px)';
              link.style.textShadow = rgbSplit(spread * 0.5, 0.3);

              setTimeout(function () {
                if (ver !== v) return;
                // Settle — dimmed hover state
                link.style.transition  = 'filter 0.15s ease, transform 0.15s ease, text-shadow 0.15s ease, opacity 0.15s ease';
                link.style.filter      = '';
                link.style.transform   = '';
                link.style.textShadow  = '';
                link.style.opacity     = '0.5';
              }, 60);
            }, 60);
          });

          link.addEventListener('mouseleave', function () {
            ver++;
            link.style.transition  = 'none';
            link.style.filter      = '';
            link.style.transform   = '';
            link.style.textShadow  = '';
            link.style.opacity     = '';
          });
        });
      })();

      // ── Character materialisation ─────────────────────────
      (function () {
        var el = document.getElementById('game-char');
        if (!el) return;

        function rnd(min, max) { return min + Math.random() * (max - min); }

        setTimeout(function () {
          var total = 28;
          var step  = 0;

          function tick() {
            var p = step / total; // 0 → 1 progress

            // Visibility: starts unreliable, locks in near the end
            var visible = p > 0.88 || Math.random() < (0.15 + p * 0.85);

            // Effects burn bright then resolve
            var blur       = ((1 - p) * 7 + 0.6).toFixed(1);
            var brightness = (2.2 - p * 1.0).toFixed(2);
            var glow       = ((1 - p) * 16).toFixed(0);
            var split      = ((1 - p) * 5 + 1.5).toFixed(1);
            var glowAlpha  = ((1 - p) * 0.9).toFixed(2);
            var splitAlpha = (0.35 + (1 - p) * 0.45).toFixed(2);

            el.style.opacity = visible ? '1' : '0';
            el.style.filter  =
              'blur(' + blur + 'px) brightness(' + brightness + ') ' +
              'drop-shadow(0 0 ' + glow + 'px rgba(109,121,202,' + glowAlpha + ')) ' +
              'drop-shadow(-' + split + 'px 1px rgba(255,30,80,' + splitAlpha + ')) ' +
              'drop-shadow(' + split + 'px -1px rgba(0,210,255,' + splitAlpha + '))';

            step++;
            if (step <= total) {
              // Fast at first, decelerates as it stabilises
              setTimeout(tick, 30 + p * p * 120);
            } else {
              el.style.opacity = '1';
              el.style.filter  = '';
              // CRT glitch takes over from here
            }
          }

          tick();
        }, 2000);
      })();

      // ── Idle bubble CRT glitch ────────────────────────────
      (function () {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        var el = document.getElementById('game-bubble');
        if (!el) return;

        function rnd(min, max) { return min + Math.random() * (max - min); }

        function rgbSplit(spread, a) {
          return 'drop-shadow(' + (-spread).toFixed(1) + 'px 1px rgba(255,30,80,' + a + ')) ' +
                 'drop-shadow(' + spread.toFixed(1)  + 'px -1px rgba(0,210,255,' + a + '))';
        }

        function holdGlitch() {
          var spread = rnd(1.5, 3.5);
          el.style.filter = 'blur(0.6px) brightness(' + rnd(1.1, 1.3).toFixed(2) + ') ' + rgbSplit(spread, 0.55);
        }

        function scheduleNoise() {
          setTimeout(function () {
            el.style.filter = 'url(#crt-noise) blur(0.6px) brightness(' + rnd(1.1, 1.3).toFixed(2) + ')';
            setTimeout(function () {
              holdGlitch();
              scheduleNoise();
            }, rnd(200, 700));
          }, rnd(2000, 6000));
        }

        // Start after bubble fades in
        setTimeout(function () {
          holdGlitch();
          scheduleNoise();
        }, 2000);
      })();

      // ── Idle character CRT glitch ─────────────────────────
      (function () {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        var el = document.getElementById('game-char');
        if (!el) return;

        function rnd(min, max) { return min + Math.random() * (max - min); }

        function rgbSplit(spread, a) {
          return 'drop-shadow(' + (-spread).toFixed(1) + 'px 1px rgba(255,30,80,' + a + ')) ' +
                 'drop-shadow(' + spread.toFixed(1)  + 'px -1px rgba(0,210,255,' + a + '))';
        }

        function holdGlitch() {
          var spread = rnd(1.5, 3.5);
          el.style.filter = 'blur(0.6px) brightness(' + rnd(1.1, 1.3).toFixed(2) + ') ' + rgbSplit(spread, 0.55);
        }

        function scheduleNoise() {
          setTimeout(function () {
            el.style.filter = 'url(#crt-noise) blur(0.6px) brightness(' + rnd(1.1, 1.3).toFixed(2) + ')';
            setTimeout(function () {
              holdGlitch();
              scheduleNoise();
            }, rnd(200, 700));
          }, rnd(2000, 6000));
        }

        // Start after materialisation resolves
        setTimeout(function () {
          holdGlitch();
          scheduleNoise();
        }, 3600);
      })();

    </script>
    </body>
</html>
